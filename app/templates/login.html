{% extends "base.html" %}

{% block title %}Login - CadastroWeb{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12 bg-white p-8 rounded-lg shadow-md border border-gray-100">
    <h2 class="text-2xl font-bold text-center text-gray-700 mb-6">Acesso ao Sistema</h2>
    
    <div id="error-message" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm"></div>

    <form id="login-form" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">E-mail Corporativo</label>
            <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Senha</label>
            <input type="password" id="password" required class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded transition">
            Entrar
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById("error-message");
        errorDiv.classList.add("hidden");

        const formData = new FormData();
        formData.append("username", document.getElementById("email").value);
        formData.append("password", document.getElementById("password").value);

        try {
            const response = await fetch("/auth/login", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || "Falha na autenticação");
            }

            // Armazena o token de acesso no navegador
            localStorage.setItem("access_token", data.access_token);
            // Redireciona para o Painel de controle
            window.location.href = "/web/dashboard";

        } catch (error) {
            errorDiv.textContent = errorError.message;
            errorDiv.classList.remove("hidden");
        }
    });
</script>
{% endblock %}
